name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
      - name: Lint
        run: |
          pip install flake8
          flake8 . --max-line-length=120 --extend-ignore=E203,W503,E402,E221,E222,E225,E251,E261,E272,E302,E303,E305,E306,E127,E128,E231,E501,E701,E712,E741,F541,F841,F811 --exclude=.git,__pycache__,.venv,build,dist
      - name: Test with coverage
        run: |
          pip install pytest pytest-cov
          pytest tests/ -v --cov --cov-report=term-missing --cov-fail-under=80

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install security tools
        run: pip install bandit pip-audit
      - name: SAST — bandit
        run: bandit -r src/ -ll -ii --format json -o bandit-report.json; bandit -r src/ -ll -ii
        continue-on-error: true
      - name: Dependency audit
        run: pip-audit --desc -r requirements.txt
        continue-on-error: true
      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json
          if-no-files-found: ignore
